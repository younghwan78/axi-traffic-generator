# SMMU-enabled Scenario Configuration
# SMMU 활성화 + Z-order + 다양한 기능 검증용

Scenario_Info:
  Name: "4K_Camera_SMMU_Enabled"

Memory_Policy:
  SMMU_Enable: true     # SMMU 활성화
  CMA_Ratio: 0.3        # 30%는 연속된 물리 메모리 할당
  Page_Size: 4096       # 4KB

Tasks:
  - TaskName: "ISP_Write_Y"
    IP_Name: "CAM_ISP_WR_0"
    Clock: 800            # MHz
    Format: "YUV420_8bit_2plane"
    Resolution: [3840, 2160]
    AccessType: "Z-order"
    Dependency: []
    Behavior_Profile:
      Type: "Eager_MO_Burst"
      Pipeline_Group: "CAM_FE_PIPE"

  - TaskName: "ISP_Write_DS"
    IP_Name: "CAM_ISP_WR_1"
    Clock: 800            # MHz
    Format: "YUV420_8bit_2plane"
    Resolution: [1920, 1080]
    AccessType: "raster-order"
    Dependency: []
    Behavior_Profile:
      Type: "Eager_MO_Burst"
      Pipeline_Group: "CAM_FE_PIPE"

  - TaskName: "ISP_Read"
    IP_Name: "CAM_ISP_RD_0"
    Clock: 800            # MHz
    Format: "YUV420_8bit_2plane"
    Resolution: [3840, 2160]
    AccessType: "raster-order"
    Dependency: []
    Behavior_Profile:
      Type: "Eager_MO_Burst"
      Pipeline_Group: "CAM_FE_PIPE"
      Backpressure_Source: "ISP_Write_Y"

  - TaskName: "CAM_AE_Stat"
    IP_Name: "CAM_STAT_WR_0"
    Clock: 800            # MHz
    Format: "RAW"
    Resolution: [3840, 2160]
    AccessType: "raster-order"
    Dependency: []
    Behavior_Profile:
      Type: "Accumulate_and_Flush"
      Trigger_Unit: "Block"
      Block_Size: [64, 64]
      Flush_Bytes: 256
      Pipeline_Group: "CAM_FE_PIPE"

  - TaskName: "DISP_Read"
    IP_Name: "DISP_RD_0"
    Clock: 533            # MHz
    Format: "YUV420_8bit_2plane"
    Resolution: [3840, 2160]
    AccessType: "raster-order"
    Dependency:
      - Wait_For: "ISP_Write_Y"
        Granularity: "Line"
        Margin: 10
    Behavior_Profile:
      Type: "Eager_MO_Burst"
      Pipeline_Group: "DPU_PIPE"
